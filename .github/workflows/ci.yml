name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────
  # 1. Quality Checks (runs on PRs + pushes)
  # ──────────────────────────────────────────────
  quality-checks:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.8.0

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm lint

      - name: Check formatting
        run: pnpm prettier --check "src/**/*.{ts,tsx}"

      - name: Type checking
        run: npx tsc --noEmit

      - name: Build project
        run: pnpm build

  # ──────────────────────────────────────────────
  # 2. E2E Tests with Playwright (runs on PRs + pushes)
  # ──────────────────────────────────────────────
  e2e-tests:
    needs: quality-checks
    runs-on: ubuntu-latest
    if: always() && needs.quality-checks.result == 'success'

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.8.0

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E tests
        continue-on-error: true
        run: BASE_URL=http://localhost:3001 pnpm playwright test
        env:
          NEXT_PUBLIC_RECAPTCHA_SITE_KEY: 6LeIxAcTAAAAAJcZVRqyHh71UMIEGNQ_MXjiZKhI
          RECAPTCHA_SECRET_KEY: 6LeIxAcTAAAAAGG-vFI1TnRWxMZNFuojJ4WifJWe
          SMTP_HOST: localhost
          SMTP_PORT: '1025'
          SMTP_USER: test
          SMTP_PASS: test
          CONTACT_EMAIL: test@rowad.com

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload test results (HTML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 30

  # ──────────────────────────────────────────────
  # 3. Deploy to cPanel via Git (only on main push)
  # ──────────────────────────────────────────────
  deploy:
    needs: [quality-checks, e2e-tests]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.quality-checks.result == 'success'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.8.0

      - name: Setup Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build production bundle
        run: pnpm build
        env:
          NEXT_PUBLIC_RECAPTCHA_SITE_KEY: ${{ secrets.NEXT_PUBLIC_RECAPTCHA_SITE_KEY }}

      - name: Copy deployment config to build output
        run: |
          cp .cpanel.yml build/.cpanel.yml
          cp .htaccess build/.htaccess
          cp .env.example build/.env.example 2>/dev/null || true

      - name: Deploy to cPanel deploy branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.GH_PAT }}
          publish_dir: ./build
          publish_branch: deploy
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'deploy: ${{ github.event.head_commit.message }}'
          keep_files: true

      - name: Deploy to cPanel via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.CPANEL_HOST }}
          username: ${{ secrets.CPANEL_USER }}
          key: ${{ secrets.CPANEL_SSH_KEY }}
          port: 22
          script: |
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "  ⚠️  WARNING: This will OVERWRITE existing files!"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            
            DEPLOYPATH=/home/irowad/public_html
            BACKUP_PATH=/home/irowad/backups
            TIMESTAMP=$(date +%Y%m%d_%H%M%S)
            
            # Create backup of existing files
            echo "📦 Creating backup of existing files..."
            mkdir -p $BACKUP_PATH
            if [ -d "$DEPLOYPATH" ] && [ "$(ls -A $DEPLOYPATH 2>/dev/null)" ]; then
              cp -R $DEPLOYPATH $BACKUP_PATH/public_html_backup_$TIMESTAMP
              echo "✅ Backup created: $BACKUP_PATH/public_html_backup_$TIMESTAMP"
              echo ""
              echo "📋 Backed up files:"
              ls -la $DEPLOYPATH | head -15
              echo ""
            else
              echo "⚠️  public_html is empty, no backup needed"
            fi
            
            # Deploy new files
            echo "🚀 Deploying new files..."
            cd /home/irowad/repositories/rowad-for-software-development
            git fetch origin deploy
            git reset --hard origin/deploy
            
            # Copy with overwrite
            cp -Rf * $DEPLOYPATH/
            cp -Rf .[a-zA-Z0-9]* $DEPLOYPATH/ 2>/dev/null || true
            
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "  ✅ Deployment Complete!"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "📍 Location: $DEPLOYPATH"
            echo "💾 Backup: $BACKUP_PATH/public_html_backup_$TIMESTAMP"
            echo "⚠️  Old files were OVERWRITTEN by new deployment"
            echo "🌐 Visit: https://rowad.com"
